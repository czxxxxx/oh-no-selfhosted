name: Bug report
description: Report a reproducible product problem. Do not use this form for security vulnerabilities.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Security issues must be reported privately as described in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, Linux, Windows or other]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
